<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#667eea,#764ba2);
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            padding:20px;
        }

        .card{

            width:100%;
            max-width:450px;
            background:white;
            padding:35px;
            border-radius:15px;
            text-align:center;
            box-shadow:0 15px 35px rgba(0,0,0,.25);

        }

        h1{
            color:#333;
            margin-bottom:20px;
        }

        .result{

            font-size:28px;
            color:#28a745;
            font-weight:bold;
            margin:30px 0;

        }

        a{

            display:inline-block;
            margin-top:20px;
            text-decoration:none;
            color:white;
            background:#667eea;
            padding:12px 25px;
            border-radius:8px;
            transition:.3s;

        }

        a:hover{
            background:#4f5bd5;
        }

        @media(max-width:500px){

            .card{
                padding:25px;
            }

            h1{
                font-size:24px;
            }

            .result{
                font-size:24px;
            }

        }

    </style>

</head>
<body>

<div class="card">

    <h1>🌸 Prediction Result</h1>

    <div class="result">
        {{ pred }}
    </div>

    <a href="/">← Predict Another Flower</a>

</div>

</body>
</html>
