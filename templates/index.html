<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iris Flower Prediction</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#4facfe,#00f2fe);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .container{
            width:100%;
            max-width:420px;
            background:#fff;
            padding:30px;
            border-radius:15px;
            box-shadow:0 15px 35px rgba(0,0,0,.2);
        }

        h1{
            text-align:center;
            margin-bottom:25px;
            color:#333;
            font-size:28px;
        }

        label{
            display:block;
            margin-bottom:6px;
            font-weight:bold;
            color:#444;
        }

        input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
            margin-bottom:18px;
            outline:none;
            transition:.3s;
        }

        input:focus{
            border-color:#4facfe;
            box-shadow:0 0 8px rgba(79,172,254,.4);
        }

        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:8px;
            background:#4facfe;
            color:white;
            font-size:18px;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            background:#1f8ef1;
        }

        .prediction{
            margin-top:20px;
            text-align:center;
            font-size:20px;
            font-weight:bold;
            color:#28a745;
        }

        .link{
            text-align:center;
            margin-top:20px;
        }

        .link a{
            text-decoration:none;
            color:#4facfe;
            font-weight:bold;
        }

        @media(max-width:500px){

            .container{
                padding:20px;
            }

            h1{
                font-size:24px;
            }

            button{
                font-size:16px;
            }

        }

    </style>

</head>
<body>

<div class="container">

    <h1>🌸 Iris Flower Prediction</h1>

    <form action="/predict" method="POST">

        <label>Sepal Length (cm)</label>
        <input type="number" name="sl" step="any" placeholder="e.g. 5.1" required>

        <label>Sepal Width (cm)</label>
        <input type="number" name="sw" step="any" placeholder="e.g. 3.5" required>

        <label>Petal Length (cm)</label>
        <input type="number" name="pl" step="any" placeholder="e.g. 1.4" required>

        <label>Petal Width (cm)</label>
        <input type="number" name="pw" step="any" placeholder="e.g. 0.2" required>

        <button type="submit">Predict Flower</button>

    </form>

    {% if pred %}
    <div class="prediction">
        {{ pred }}
    </div>
    {% endif %}

    <div class="link">
        <a href="/">Refresh Page</a>
    </div>

</div>

</body>
</html>
